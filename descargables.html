<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-PRDGM | Repositorio</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #b8926a; --tierra: #1a1512; --musgo: #2a332a; --pergamino: #d7ccc8; }
        body { background: var(--tierra); color: var(--pergamino); font-family: 'Crimson Pro', serif; margin: 0; padding-top: 100px; }
        nav { position: fixed; width: 100%; top: 0; display: flex; justify-content: space-between; padding: 15px 50px; background: #000; border-bottom: 2px solid var(--oro); z-index: 1000; }
        h1, h2 { font-family: 'MedievalSharp'; color: var(--oro); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px 10%; }
        .card { background: rgba(45, 36, 30, 0.6); border: 1px solid var(--oro); padding: 20px; transition: 0.3s; }
        .card img, .card iframe { width: 100%; aspect-ratio: 16/9; border: 1px solid var(--oro); margin-bottom: 15px; }
        .btn-link { display: inline-block; padding: 10px 20px; border: 1px solid var(--oro); color: white; text-decoration: none; font-family: 'MedievalSharp'; background: var(--musgo); font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <h1 style="font-size: 1.2rem;">N-PRDGM</h1>
        <a href="index.html" style="color:var(--oro); text-decoration:none; font-family:'MedievalSharp';">← VOLVER</a>
    </nav>

    <h2 id="titulo-seccion" style="font-size: 3rem; margin-top: 40px;">Cargando...</h2>
    <main id="app" class="grid"></main>

    <script>
        const SHEET_ID = '13Qqp0VlWF94msoKVss6cRxKvtpxkpds_5V4wdIGPmfE';
        // CAMBIÁ ESTO EN CADA ARCHIVO: 'Galeria', 'Cursos', 'Descargables', 'Historico' o 'Amigas'
        const SECCION_FILTRO = 'Galeria'; 

        async function init() {
            document.getElementById('titulo-seccion').innerText = SECCION_FILTRO;
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
            const resp = await fetch(url);
            const csv = await resp.text();
            const rows = csv.split('\n').slice(1);
            const app = document.getElementById('app');

            rows.forEach(row => {
                const [sec, tit, desc, lnk, img] = row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                if (sec.toLowerCase() === SECCION_FILTRO.toLowerCase()) {
                    let media = lnk.includes('youtube') ? `<iframe src="https://www.youtube.com/embed/${lnk.split('v=')[1] || lnk.split('/').pop()}" frameborder="0" allowfullscreen></iframe>` : `<img src="${img || 'https://via.placeholder.com/400'}">`;
                    
                    app.innerHTML += `
                        <article class="card">
                            ${media}
                            <h4 style="font-family:'MedievalSharp'; color:var(--oro); margin-bottom:10px;">${tit}</h4>
                            <p>${desc}</p>
                            ${lnk ? `<a href="${lnk}" target="_blank" class="btn-link">ABRIR</a>` : ''}
                        </article>`;
                }
            });
        }
        init();
    </script>
</body>
</html>
